<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760"><rect width="1400" height="760" fill="#f3f8fc"/><text x="50" y="55" font-family="Arial" font-size="32" font-weight="700" fill="#12395a">EC diagnostic and CNS tropism hypothesis framework</text><text x="50" y="88" font-family="Arial" font-size="16" fill="#13243a">Hypothesis-generating strategy: diagnostic EC specificity plus non-lethal migration/cycle-interruption logic.</text><rect x="60" y="130" width="280" height="135" rx="16" fill="white" stroke="#12395a" stroke-width="3"/><text x="85" y="168" font-family="Arial" font-size="20" font-weight="700">AnEnPi EC inventory</text><text x="85" y="198" font-family="Arial" font-size="15">Complete four-level ECs</text><text x="85" y="220" font-family="Arial" font-size="15">from seven parasite datasets</text><rect x="390" y="130" width="280" height="135" rx="16" fill="#e8f5ff" stroke="#008c9e" stroke-width="3"/><text x="415" y="168" font-family="Arial" font-size="20" font-weight="700">Strategy A</text><text x="415" y="198" font-family="Arial" font-size="15">Parasite-specific ECs</text><text x="415" y="220" font-family="Arial" font-size="15">as diagnostic markers</text><rect x="720" y="130" width="280" height="135" rx="16" fill="#eaf8f2" stroke="#2a9d8f" stroke-width="3"/><text x="745" y="168" font-family="Arial" font-size="20" font-weight="700">Strategy B</text><text x="745" y="198" font-family="Arial" font-size="15">Migration/tropism enzymes</text><text x="745" y="220" font-family="Arial" font-size="15">as intervention hypotheses</text><rect x="1050" y="130" width="280" height="135" rx="16" fill="#fff6dc" stroke="#ffbf47" stroke-width="3"/><text x="1075" y="168" font-family="Arial" font-size="20" font-weight="700">Safety logic</text><text x="1075" y="198" font-family="Arial" font-size="15">Reduce direct killing in CNS</text><text x="1075" y="220" font-family="Arial" font-size="15">when inflammation is risky</text><path d="M340 198 L390 198 M670 198 L720 198 M1000 198 L1050 198" stroke="#12395a" stroke-width="5"/><rect x="160" y="380" width="320" height="145" rx="16" fill="white" stroke="#12395a" stroke-width="3"/><text x="185" y="420" font-family="Arial" font-size="20" font-weight="700">Data traceability</text><text x="185" y="450" font-family="Arial" font-size="15">EC, FASTA, source file,</text><text x="185" y="472" font-family="Arial" font-size="15">database links and tables</text><rect x="540" y="380" width="320" height="145" rx="16" fill="white" stroke="#12395a" stroke-width="3"/><text x="565" y="420" font-family="Arial" font-size="20" font-weight="700">Experimental validation</text><text x="565" y="450" font-family="Arial" font-size="15">qPCR specificity, enzyme assay,</text><text x="565" y="472" font-family="Arial" font-size="15">migration and inflammation assays</text><rect x="920" y="380" width="320" height="145" rx="16" fill="white" stroke="#12395a" stroke-width="3"/><text x="945" y="420" font-family="Arial" font-size="20" font-weight="700">Public resource</text><text x="945" y="450" font-family="Arial" font-size="15">GitHub Pages, Streamlit,</text><text x="945" y="472" font-family="Arial" font-size="15">SQLite, FASTA and scripts</text><rect x="120" y="610" width="1160" height="70" rx="18" fill="#fff6dc" stroke="#ffbf47" stroke-width="3"/><text x="150" y="650" font-family="Arial" font-size="18" fill="#13243a">The framework proposes candidates for validation; it does not claim clinical efficacy without experiments.</text></svg>